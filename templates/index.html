<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Currency Scanner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        
        h2 {
            margin-bottom: 20px;
            text-align: center;
        }
        
        #camera-screen {
            position: relative;
            width: 320px;
            height: 240px;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            background: black;
        }
        
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        #box {
            position: absolute;
            border: 2px dashed #00ff00;
            width: 70%;
            height: 40%;
            top: 30%;
            left: 15%;
            pointer-events: none;
        }
        
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        
        input[type="number"] {
            padding: 8px;
            width: 150px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        button:hover {
            background-color: #0056b3;
        }
        
        #result-area {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        
        h3 {
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <h2>Currency Scanner → PHP</h2>

    <!-- Camera -->
    <div id="camera-screen">
        <video id="video" autoplay muted playsinline></video>
        <div id="box"></div>
    </div>

    <form id="sendForm" method="POST">
        <input type="hidden" name="imageData" id="imageData">
        <input type="hidden" name="currency_hidden" id="currency_hidden">

        <!-- Centered Scan Button -->
        <button type="button" id="capture">📸 Scan Bill</button>

        <!-- Step 2: Amount input only shows after detection -->
        {% if detected_currency %}
        <h3>Detected: {{ detected_currency }}</h3>
        <input type="number" name="amount" step="0.01" placeholder="Enter amount" required>
        <button type="submit">Convert to PHP</button>
        <script>
            document.getElementById("currency_hidden").value = "{{ detected_currency }}";
        </script>
        {% endif %}
    </form>

    <div id="result-area">
        {% if php_result %}
        <h2>{{ php_result }}</h2>
        {% endif %}
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
